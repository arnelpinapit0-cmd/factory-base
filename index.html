<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodyline Production | Factory Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.5);
            --text: #f8fafc; --text-dim: #94a3b8; --border: #27272a; 
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
        }
        .light-mode {
            --bg: #f1f5f9; --surface: #ffffff; --accent: #2563eb; --accent-glow: rgba(37, 99, 235, 0.2);
            --text: #0f172a; --text-dim: #64748b; --border: #cbd5e1;
        }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.3s; }
        
        /* AUTH MODAL */
        #portal-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .portal-card { background: #18181b; border: 1px solid var(--accent); padding: 40px; border-radius: 12px; text-align: center; width: 350px; }
        .portal-card input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid var(--border); color: var(--success); text-align: center; font-size: 20px; letter-spacing: 4px; box-sizing: border-box; }

        /* SLIDE MENU */
        #side-menu { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--surface); border-left: 1px solid var(--border); z-index: 999; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #side-menu.open { right: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 998; }
        
        /* HEADER & AVATAR */
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); background: #333; }
        
        /* GRID */
        .grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border); border-left: 4px solid var(--accent); }
        
        /* INPUTS */
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }

        /* AVATAR SELECTOR */
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .avatar-opt { cursor: pointer; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; width: 40px; }
        .avatar-opt.selected { border-color: var(--accent); transform: scale(1.1); }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid var(--border); color: var(--text-dim); }
        td { padding: 10px; border-bottom: 1px solid var(--border); }

        @media print {
            #side-menu, .btn, #entry-form, .edit-cell, .menu-btn { display: none !important; }
            body { padding: 0; background: white; color: black; }
            .panel { border: 1px solid #eee; box-shadow: none; }
            .header-main { text-align: center; display: block; }
        }
    </style>
</head>
<body class="light-mode">

<div id="portal-overlay">
    <div class="portal-card">
        <h2 style="color:var(--accent)">SYSTEM ACCESS</h2>
        <input type="password" id="access-code" placeholder="PIN CODE">
        <button class="btn btn-primary" onclick="login()">ENTER DASHBOARD</button>
    </div>
</div>

<div id="menu-overlay" class="menu-overlay" onclick="toggleMenu()"></div>
<div id="side-menu">
    <h3 style="margin-top:0">System Settings</h3>
    
    <label style="font-size: 12px; color: var(--text-dim);">Choose Your Avatar</label>
    <div class="avatar-grid">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-opt" onclick="setAvatar(this.src)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" class="avatar-opt" onclick="setAvatar(this.src)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=George" class="avatar-opt" onclick="setAvatar(this.src)">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max" class="avatar-opt" onclick="setAvatar(this.src)">
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
    
    <button class="btn btn-outline" onclick="toggleTheme()">🌓 Toggle Dark/Light</button>
    <button class="btn btn-outline" onclick="window.print()">🖨️ Export PDF Report</button>
    <button class="btn btn-outline" onclick="exportExcel()">📊 Export to Excel</button>
    
    <button class="btn btn-primary" style="margin-top: 50px;" onclick="toggleMenu()">Close Menu</button>
</div>

<div id="main-content" style="display:none">
    <div class="header-main">
        <div class="user-profile">
            <img id="current-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="avatar-img">
            <div>
                <h2 id="user-name" style="margin:0">User</h2>
                <div id="user-role" style="font-size:12px; color:var(--text-dim)">Viewer</div>
            </div>
        </div>
        
        <div style="text-align: center;">
            <h1 style="margin:0; color:var(--accent); letter-spacing: 2px;">BODYLINE PRODUCTION</h1>
            <span style="font-size:12px; color:var(--text-dim)">FACTORY INTELLIGENCE v2.0</span>
        </div>

        <button class="btn btn-outline menu-btn" style="width:auto" onclick="toggleMenu()">⚙️ Settings</button>
    </div>

    <div class="kpi-row">
        <div class="kpi-card"><small>TOTAL ACTUAL</small><div id="kpi-yield">0</div></div>
        <div class="kpi-card"><small>AVG EFFICIENCY</small><div id="kpi-eff">0%</div></div>
        <div class="kpi-card"><small>TOP LINE</small><div id="kpi-top">Line 1</div></div>
        <div class="kpi-card"><small>ACTIVE VIEWERS</small><div>1</div></div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>Efficiency Trends</h3>
            <canvas id="mainChart" height="150"></canvas>
            
            <h3>Master Log</h3>
            <div style="overflow-x:auto">
                <table>
                    <thead>
                        <tr><th>Date</th><th>Line</th><th>Target</th><th>Actual</th><th>Eff%</th><th class="admin-only">Action</th></tr>
                    </thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
        </div>

        <div class="panel" id="admin-panel">
            <div id="entry-form">
                <h3 style="color:var(--accent)">Data Entry</h3>
                <input type="date" id="f-date">
                <select id="f-line">
                    <option>Line 1</option><option>Line 2</option><option>Line 3</option>
                    <option>Line 4</option><option>Line 5</option><option>Line 6</option>
                </select>
                <input type="number" id="f-target" placeholder="Target">
                <input type="number" id="f-actual" placeholder="Actual">
                <button class="btn btn-primary" style="margin-top:15px" onclick="saveData()">SAVE DATA</button>
            </div>

            <div id="access-log-section" style="margin-top:30px; display:none;">
                <h3 style="font-size:14px; color:var(--danger)">🔐 SYSTEM ACCESS LOGS</h3>
                <div id="log-list" style="font-family:monospace; font-size:11px; height:200px; overflow-y:auto; background:#000; padding:10px;">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let masterData = JSON.parse(localStorage.getItem('bodyline_data')) || [];
    let accessLogs = JSON.parse(localStorage.getItem('bodyline_access')) || [];
    let currentUser = "";
    let isEngineer = false;

    function login() {
        const code = document.getElementById('access-code').value;
        const adminSection = document.getElementById('admin-panel');
        const logSection = document.getElementById('access-log-section');
        
        if(code === "122022") {
            currentUser = "Engr. Pinapit";
            isEngineer = true;
            logSection.style.display = "block";
            adminSection.style.display = "block";
        } else if(code === "MELVIN24") {
            currentUser = "Sir Melvin";
        } else if(code === "RAUL24") {
            currentUser = "Boss Raul";
        } else {
            alert("Invalid Code"); return;
        }

        document.getElementById('user-name').innerText = currentUser;
        document.getElementById('user-role').innerText = isEngineer ? "System Admin" : "Executive Viewer";
        document.getElementById('portal-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        
        // Hide Admin tools if not engineer
        if(!isEngineer) {
            document.getElementById('entry-form').style.display = 'none';
        }

        logAccess(currentUser);
        initChart();
        renderData();
    }

    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('open');
        const overlay = document.getElementById('menu-overlay');
        overlay.style.display = overlay.style.display === 'block' ? 'none' : 'block';
    }

    function setAvatar(src) {
        document.getElementById('current-avatar').src = src;
        localStorage.setItem('user_avatar_' + currentUser, src);
        // Highlight selection
        document.querySelectorAll('.avatar-opt').forEach(img => img.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
    }

    function logAccess(user) {
        const entry = `${new Date().toLocaleString()} - ${user} logged in`;
        accessLogs.unshift(entry);
        localStorage.setItem('bodyline_access', JSON.stringify(accessLogs.slice(0, 50)));
        renderLogs();
    }

    function renderLogs() {
        document.getElementById('log-list').innerHTML = accessLogs.map(l => `<div style="margin-bottom:5px; border-bottom:1px solid #222">${l}</div>`).join('');
    }

    function saveData() {
        const entry = {
            id: Date.now(),
            date: document.getElementById('f-date').value,
            line: document.getElementById('f-line').value,
            target: parseInt(document.getElementById('f-target').value),
            actual: parseInt(document.getElementById('f-actual').value)
        };
        masterData.push(entry);
        localStorage.setItem('bodyline_data', JSON.stringify(masterData));
        renderData();
    }

    function renderData() {
        const body = document.getElementById('log-body');
        let totalActual = 0;
        let totalTarget = 0;

        body.innerHTML = masterData.map(row => {
            const eff = ((row.actual / row.target) * 100).toFixed(1);
            totalActual += row.actual;
            totalTarget += row.target;
            const color = eff < 60 ? 'var(--danger)' : (eff < 90 ? 'var(--warning)' : 'var(--success)');
            
            return `<tr>
                <td>${row.date}</td>
                <td>${row.line}</td>
                <td>${row.target}</td>
                <td>${row.actual}</td>
                <td style="color:${color}; font-weight:bold">${eff}%</td>
                <td class="admin-only" style="display:${isEngineer ? 'table-cell' : 'none'}">
                    <button onclick="deleteRow(${row.id})" style="background:none; border:none; color:var(--danger); cursor:pointer">Delete</button>
                </td>
            </tr>`;
        }).join('');

        document.getElementById('kpi-yield').innerText = totalActual;
        document.getElementById('kpi-eff').innerText = totalTarget > 0 ? ((totalActual / totalTarget) * 100).toFixed(1) + '%' : '0%';
        updateChart();
    }

    function deleteRow(id) {
        masterData = masterData.filter(r => r.id !== id);
        localStorage.setItem('bodyline_data', JSON.stringify(masterData));
        renderData();
    }

    function exportExcel() {
        let csv = "Date,Line,Target,Actual,Efficiency\n";
        masterData.forEach(r => {
            csv += `${r.date},${r.line},${r.target},${r.actual},${((r.actual/r.target)*100).toFixed(1)}%\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'Bodyline_Production.csv';
        a.click();
    }

    let myChart;
    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Efficiency %', data: [], backgroundColor: [] }] },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    function updateChart() {
        if(!myChart) return;
        const labels = masterData.map(r => r.line);
        const values = masterData.map(r => (r.actual/r.target)*100);
        const colors = values.map(v => v < 60 ? '#ef4444' : (v < 90 ? '#f59e0b' : '#10b981'));
        
        myChart.data.labels = labels;
        myChart.data.datasets[0].data = values;
        myChart.data.datasets[0].backgroundColor = colors;
        myChart.update();
    }
</script>
</body>
</html>
