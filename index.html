<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Pro - Online Team Base</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --warning: #f59e0b; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .chart-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; height: 350px; }
        .input-section { background: white; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: end; border: 2px solid var(--primary); }
        input, button { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn-add { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Production Dashboard</h1>
        <div class="stats-grid">
            <div class="card"><h3>Target</h3><p id="total-target">0</p></div>
            <div class="card"><h3>Actual</h3><p id="total-actual">0</p></div>
            <div class="card"><h3>Efficiency</h3><p id="efficiency">0%</p></div>
        </div>
        <div class="chart-container"><canvas id="productionChart"></canvas></div>
        <div class="input-section">
            <input type="date" id="prod-date">
            <input type="text" id="machine-name" placeholder="Machine ID">
            <input type="number" id="target-qty" placeholder="Target">
            <input type="number" id="actual-qty" placeholder="Actual">
            <button class="btn-add" onclick="handleSubmit()">Save to Cloud</button>
        </div>
        <table>
            <thead><tr><th>Date</th><th>Machine</th><th>Target</th><th>Actual</th><th>+/-</th></tr></thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>

    <script>
        const SB_URL = "https://ywjnbslxdssyriokcdws.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3am5ic2x4ZHNzeXJpb2tjZHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDg1MDUsImV4cCI6MjA5MTIyNDUwNX0.sNFCBZoSwZS0b5eU6iBmLeTt5ru7dP8G2GYJ9hrxAFg";
        const supabase = libsupabase.createClient(SB_URL, SB_KEY);

        let myChart;
        async function loadData() {
            const { data, error } = await supabase.from('production_logs').select('*').order('date', { ascending: true });
            if (data) { renderUI(data); renderChart(data); }
        }

        async function handleSubmit() {
            const date = document.getElementById('prod-date').value;
            const machine = document.getElementById('machine-name').value;
            const target = parseInt(document.getElementById('target-qty').value);
            const actual = parseInt(document.getElementById('actual-qty').value);
            await supabase.from('production_logs').insert([{ date, machine, target, actual }]);
            loadData();
        }

        function renderUI(data) {
            const tbody = document.getElementById('log-body');
            tbody.innerHTML = "";
            let t = 0, a = 0;
            data.forEach(item => {
                t += item.target; a += item.actual;
                tbody.innerHTML += `<tr><td>${item.date}</td><td>${item.machine}</td><td>${item.target}</td><td>${item.actual}</td><td>${item.actual - item.target}</td></tr>`;
            });
            document.getElementById('total-target').innerText = t;
            document.getElementById('total-actual').innerText = a;
            document.getElementById('efficiency').innerText = t > 0 ? ((a/t)*100).toFixed(1) + "%" : "0%";
        }

        function renderChart(data) {
            if(myChart) myChart.destroy();
            const ctx = document.getElementById('productionChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{ label: 'Actual', data: data.map(d => d.actual), borderColor: '#2563eb' }]
                }
            });
        }
        loadData();
    </script>
</body>
</html>
