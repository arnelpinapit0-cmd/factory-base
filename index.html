<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Production HMI | V6 Engineered</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0f19; --surface: #111827; --text-primary: #f9fafb; --text-secondary: #9ca3af;
            --border: #374151; --accent: #3b82f6; --success: #059669; --warning: #fbbf24; --danger: #ef4444;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text-primary); margin: 0; padding: 10px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .hmi-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Inputs */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #1f2937; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; }

        /* Buttons */
        .line-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px; }
        .line-btn { padding: 10px; background: #1f2937; border: 1px solid var(--border); color: white; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .line-btn.active { background: var(--accent); border-color: var(--accent); }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-cancel { width: 100%; padding: 10px; background: #374151; border: none; color: white; margin-top: 10px; border-radius: 6px; cursor: pointer; display: none; }

        /* Table */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: var(--text-secondary); border-bottom: 2px solid var(--border); font-size: 12px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        .btn-action { padding: 6px 12px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="hmi-header">
        <div>
            <h2 id="greet" style="margin:0;">System Initializing...</h2>
            <small id="clock" style="color:var(--accent); font-weight:bold;"></small>
        </div>
        <div style="text-align:right">
            <div style="font-size:10px; color:var(--text-secondary)">DATABASE STATUS</div>
            <div id="db-status" style="color:var(--danger)">● OFFLINE</div>
        </div>
    </div>

    <div class="panel" id="form-container">
        <h3 id="form-mode" style="margin-top:0; color:var(--accent)">DATA ACQUISITION</h3>
        <input type="hidden" id="entry-id">
        
        <label>Production Line</label>
        <div class="line-grid">
            <button class="line-btn active" onclick="setLine('Line 1', this)">L1</button>
            <button class="line-btn" onclick="setLine('Line 2', this)">L2</button>
            <button class="line-btn" onclick="setLine('Line 3', this)">L3</button>
            <button class="line-btn" onclick="setLine('Line 4', this)">L4</button>
            <button class="line-btn" onclick="setLine('Line 5', this)">L5</button>
            <button class="line-btn" onclick="setLine('Line 6', this)">L6</button>
        </div>

        <div class="input-grid">
            <div><label>Date</label><input type="date" id="in-date"></div>
            <div><label>Target</label><input type="number" id="in-target" placeholder="0"></div>
        </div>
        <div class="input-grid">
            <div><label>Actual</label><input type="number" id="in-actual" placeholder="0"></div>
            <div><label>Downtime (Min)</label><input type="number" id="in-down" value="0"></div>
        </div>

        <button class="btn-main" id="btn-submit" onclick="submitData()">TRANSMIT DATA</button>
        <button class="btn-cancel" id="btn-cancel" onclick="resetForm()">CANCEL EDIT</button>
    </div>

    <div class="panel">
        <h3 style="margin-top:0">PRODUCTION LOGS</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>DATE</th>
                        <th>LINE</th>
                        <th>TARGET</th>
                        <th>ACTUAL</th>
                        <th>DOWN</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="log-table"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        url: "https://ywjnbslxdssyriokcdws.supabase.co",
        key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3am5ic2x4ZHNzeXJpb2tjZHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDg1MDUsImV4cCI6MjA5MTIyNDUwNX0.sNFCBZoSwZS0b5eU6iBmLeTt5ru7dP8G2GYJ9hrxAFg"
    };

    const sb = supabase.createClient(CONFIG.url, CONFIG.key);
    let activeLine = "Line 1";
    let store = [];

    // Initialize
    window.onload = () => {
        document.getElementById('greet').innerText = `Good Evening, Sir`;
        document.getElementById('in-date').valueAsDate = new Date();
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        refreshData();
    };

    function setLine(val, btn) {
        activeLine = val;
        document.querySelectorAll('.line-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    async function refreshData() {
        const { data, error } = await sb.from('production_logs').select('*').order('date', {ascending: false});
        if(error) {
            console.error(error);
            return;
        }
        store = data;
        document.getElementById('db-status').innerText = "● ONLINE";
        document.getElementById('db-status').style.color = "var(--success)";
        renderTable(data);
    }

    function renderTable(data) {
        const body = document.getElementById('log-table');
        body.innerHTML = data.map(row => `
            <tr>
                <td>${row.date}</td>
                <td style="color:var(--accent); font-weight:bold">${row.machine}</td>
                <td>${row.target}</td>
                <td>${row.actual}</td>
                <td style="color:var(--danger)">${row.downtime}m</td>
                <td>
                    <button class="btn-action" style="background:var(--warning); color:black" onclick="startEdit(${row.id})">EDIT</button>
                    <button class="btn-action" style="background:var(--danger); color:white" onclick="deleteEntry(${row.id})">DEL</button>
                </td>
            </tr>
        `).join('');
    }

    function startEdit(id) {
        const entry = store.find(i => i.id === id);
        if(!entry) return alert("Record not found in local memory.");

        document.getElementById('entry-id').value = entry.id;
        document.getElementById('in-date').value = entry.date;
        document.getElementById('in-target').value = entry.target;
        document.getElementById('in-actual').value = entry.actual;
        document.getElementById('in-down').value = entry.downtime;
        
        // Match Line Button
        document.querySelectorAll('.line-btn').forEach(btn => {
            if(btn.innerText.includes(entry.machine.replace('Line ',''))) {
                setLine(entry.machine, btn);
            }
        });

        document.getElementById('form-mode').innerText = "EDITING RECORD #" + id;
        document.getElementById('btn-submit').innerText = "UPDATE SYSTEM";
        document.getElementById('btn-submit').style.background = "var(--warning)";
        document.getElementById('btn-submit').style.color = "black";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('entry-id').value = "";
        document.getElementById('in-target').value = "";
        document.getElementById('in-actual').value = "";
        document.getElementById('in-down').value = "0";
        document.getElementById('form-mode').innerText = "DATA ACQUISITION";
        document.getElementById('btn-submit').innerText = "TRANSMIT DATA";
        document.getElementById('btn-submit').style.background = "var(--accent)";
        document.getElementById('btn-submit').style.color = "white";
        document.getElementById('btn-cancel').style.display = "none";
    }

    async function submitData() {
        const id = document.getElementById('entry-id').value;
        const payload = {
            date: document.getElementById('in-date').value,
            machine: activeLine,
            target: parseInt(document.getElementById('in-target').value) || 0,
            actual: parseInt(document.getElementById('in-actual').value) || 0,
            downtime: parseInt(document.getElementById('in-down').value) || 0
        };

        if(id) {
            const { error } = await sb.from('production_logs').update(payload).eq('id', id);
            if(error) alert("UPDATE FAILED: " + error.message);
            else { alert("System Updated."); resetForm(); refreshData(); }
        } else {
            const { error } = await sb.from('production_logs').insert([payload]);
            if(error) alert("INSERT FAILED: " + error.message);
            else { alert("Data Transmitted."); resetForm(); refreshData(); }
        }
    }

    async function deleteEntry(id) {
        if(!confirm("Purge record permanently?")) return;
        const { error } = await sb.from('production_logs').delete().eq('id', id);
        if(error) alert("DELETE FAILED: " + error.message);
        else refreshData();
    }
</script>
</body>
</html>
