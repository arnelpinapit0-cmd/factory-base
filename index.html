<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodyline Pro | Cloud Sync HMI v8.2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #09090b; --surface: #18181b; --accent: #0ea5e9; --accent-glow: rgba(14, 165, 233, 0.4);
            --text: #f8fafc; --text-dim: #94a3b8; --border: #27272a; 
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        .light-mode {
            --bg: #f8fafc; --surface: #ffffff; --accent: #2563eb; --accent-glow: rgba(37, 99, 235, 0.2);
            --text: #0f172a; --text-dim: #64748b; --border: #e2e8f0;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; overflow-x: hidden; }

        /* CLOUD CONNECTION STATUS */
        .cloud-status { position: fixed; top: 10px; right: 10px; font-size: 11px; display: flex; align-items: center; gap: 8px; background: var(--surface); padding: 6px 12px; border-radius: 20px; z-index: 5000; border: 1px solid var(--border); font-weight: bold; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-offline { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .dot-online { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* AUTH & HEADER */
        #portal-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: #18181b; padding: 40px; border-radius: 16px; border: 1px solid var(--accent); width: 320px; text-align: center; }
        .auth-card input { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: var(--success); font-size: 20px; text-align: center; border-radius: 8px; margin: 20px 0; letter-spacing: 5px; }
        .header-banner { text-align: center; padding: 25px 15px 15px 15px; background: var(--surface); border-bottom: 2px solid var(--accent); }

        /* TABS & LAYOUT */
        .tabs { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .tab-btn { padding: 8px 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); border-radius: 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .main-content { padding: 0 15px; max-width: 1600px; margin: auto; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        .kpi-card { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; text-align: center; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; }

        /* FORM */
        input, select, textarea { width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; box-sizing: border-box; margin-bottom: 5px; }
        .btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; width: 100%; }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
        td { padding: 8px; border-bottom: 1px solid var(--border); }
        .admin-only { display: none; }
    </style>
</head>
<body class="light-mode">

    <div class="cloud-status">
        <div id="cloud-dot" class="status-dot dot-offline"></div>
        <span id="cloud-text">CONNECTING TO SERVER...</span>
    </div>

    <div id="portal-overlay">
        <div class="auth-card">
            <h2 style="margin:0; color:var(--accent)">BODYLINE LOGIN</h2>
            <input type="password" id="access-code" placeholder="PIN CODE">
            <button class="btn btn-primary" onclick="authorize()">ENTER</button>
        </div>
    </div>

    <div class="header-banner">
        <h1 style="margin:0; letter-spacing: 2px; font-size: 24px;">BODYLINE PRODUCTION</h1>
        <div style="display: flex; justify-content: center; gap: 15px; margin-top: 5px; font-size: 11px;">
            <span id="user-display" style="font-weight: bold; color: var(--accent);">Viewer</span>
            <span id="delay-status" style="color: var(--warning); display: none;">(3-Min Viewer Delay Active)</span>
            <span id="live-clock" style="font-family: monospace;"></span>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="setPeriod('daily', this)">Daily</button>
        <button class="tab-btn" onclick="setPeriod('weekly', this)">Weekly</button>
        <button class="tab-btn" onclick="setPeriod('monthly', this)">Monthly</button>
        <button class="tab-btn" onclick="setPeriod('yearly', this)">Yearly</button>
    </div>

    <div class="main-content">
        <div class="kpi-grid">
            <div class="kpi-card"><small>Yield</small><div id="kpi-yield" style="font-size:18px; font-weight:bold;">0</div></div>
            <div class="kpi-card"><small>Efficiency</small><div id="kpi-eff" style="font-size:18px; font-weight:bold;">0%</div></div>
            <div class="kpi-card"><small>Quality</small><div id="kpi-quality" style="font-size:18px; font-weight:bold;">0%</div></div>
            <div class="kpi-card"><small>Downtime</small><div id="kpi-down" style="font-size:18px; font-weight:bold;">0m</div></div>
        </div>

        <div class="chart-row">
            <div class="panel">
                <h3 style="margin:0 0 10px 0; font-size: 14px;">Yield Monitoring</h3>
                <div style="height: 200px;"><canvas id="prodChart"></canvas></div>
            </div>
            <div class="panel">
                <h3 style="margin:0 0 10px 0; font-size: 14px;">Efficiency per Line</h3>
                <div style="height: 200px;"><canvas id="effChart"></canvas></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="panel admin-only" id="admin-form">
                <h3 style="margin:0 0 10px 0; color:var(--accent); font-size: 14px;">Data Acquisition</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <input type="date" id="f-date">
                    <select id="f-shift"><option>Day Shift</option><option>Night Shift</option></select>
                    <select id="f-line"><option>Line 1</option><option>Line 2</option><option>Line 3</option><option>Line 4</option><option>Line 5</option><option>Line 6</option></select>
                    <select id="f-reason"><option>Normal</option><option>Mechanical</option><option>Electrical</option><option>Material</option><option>QC</option></select>
                    <input type="number" id="f-target" placeholder="Target">
                    <input type="number" id="f-actual" placeholder="Actual">
                    <input type="number" id="f-rejects" placeholder="Rejects" value="0">
                    <input type="number" id="f-down" placeholder="Down(m)" value="0">
                </div>
                <button class="btn btn-primary" onclick="saveData()" style="margin-top:5px;">TRANSMIT TO CLOUD</button>
            </div>

            <div class="panel">
                <h3 style="margin:0">Master Log (Cloud Sync)</h3>
                <div style="overflow-x:auto;">
                    <table id="log-table">
                        <thead>
                            <tr><th>Date</th><th>Shift</th><th>Line</th><th>Actual</th><th>Eff%</th><th class="admin-only">Action</th></tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONNECTION
        const SB_URL = "https://ywjnbslxdssyriokcdws.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3am5ic2x4ZHNzeXJpb2tjZHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NDg1MDUsImV4cCI6MjA5MTIyNDUwNX0.sNFCBZoSwZS0b5eU6iBmLeTt5ru7dP8G2GYJ9hrxAFg";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let rawCloudData = []; // Untouched data from server
        let displayData = [];  // Data allowed to be shown on screen
        let isEngineer = false;
        let period = 'daily';
        let charts = {};

        function authorize() {
            const pin = document.getElementById('access-code').value;
            const roles = {
                "122022": { name: "Engr. Pinapit (Admin)", admin: true },
                "882041": { name: "Sir Melvin", admin: false },
                "559312": { name: "Boss Raul", admin: false },
                "440192": { name: "Production Dept", admin: false },
                "773055": { name: "Quality Control", admin: false },
                "992841": { name: "Engineering Dept", admin: false },
                "101020": { name: "Guest Viewer", admin: false }
            };

            if(roles[pin]) {
                const user = roles[pin];
                document.getElementById('user-display').innerText = user.name;
                if(user.admin) {
                    isEngineer = true;
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                } else {
                    document.getElementById('delay-status').style.display = 'inline';
                }
                
                document.getElementById('portal-overlay').style.display = 'none';
                initCharts();
                fetchData();
                setupRealtime();
                
                // Refresh viewer screen every 10 seconds to process the 3-minute delay
                setInterval(processDelayAndRender, 10000); 
            } else { alert("Access Denied"); }
        }

        // --- THE MAGIC REAL-TIME FUNCTION ---
        function setupRealtime() {
            // Check Server Connection
            sb.from('production_logs').select('id').limit(1).then(({ error }) => {
                const dot = document.getElementById('cloud-dot');
                const txt = document.getElementById('cloud-text');
                if(!error) {
                    dot.className = "status-dot dot-online";
                    txt.innerText = "CLOUD SYNC: ACTIVE";
                    txt.style.color = "var(--success)";
                } else {
                    dot.className = "status-dot dot-offline";
                    txt.innerText = "CLOUD SYNC: FAILED (Check RLS)";
                    txt.style.color = "var(--danger)";
                }
            });

            // Listen for any new inserts or deletes instantly
            sb.channel('custom-all-channel')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'production_logs' }, (payload) => {
                  console.log("Cloud Update Received!", payload);
                  fetchData(); // Pull fresh data the second someone else changes it
              })
              .subscribe();
        }

        async function fetchData() {
            const { data, error } = await sb.from('production_logs').select('*').order('created_at', {ascending:false});
            if(!error && data) {
                rawCloudData = data;
                processDelayAndRender();
            } else {
                console.error("Database Error:", error);
            }
        }

        function processDelayAndRender() {
            const now = new Date();
            
            // If Admin, show everything immediately. If Viewer, filter out anything less than 3 minutes old.
            if(isEngineer) {
                displayData = rawCloudData;
            } else {
                displayData = rawCloudData.filter(r => {
                    const entryTime = new Date(r.created_at);
                    return (now - entryTime) > 180000; // 180,000 milliseconds = 3 minutes
                });
            }

            applyTimeFilters();
        }

        async function saveData() {
            // Visual indicator
            const btn = document.querySelector('.btn-primary');
            btn.innerText = "TRANSMITTING...";

            const entry = {
                date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
                shift: document.getElementById('f-shift').value,
                line: document.getElementById('f-line').value,
                target: parseInt(document.getElementById('f-target').value) || 0,
                actual: parseInt(document.getElementById('f-actual').value) || 0,
                rejects: parseInt(document.getElementById('f-rejects').value) || 0,
                down: parseInt(document.getElementById('f-down').value) || 0,
                reason: document.getElementById('f-reason').value
            };

            const { error } = await sb.from('production_logs').insert([entry]);
            
            if(!error) {
                document.getElementById('f-actual').value = '';
                document.getElementById('f-down').value = '0';
                btn.innerText = "TRANSMIT TO CLOUD";
                fetchData(); // Immediately pull back your own data
            } else {
                alert("Upload failed. Please check your internet connection.");
                btn.innerText = "TRANSMIT TO CLOUD";
            }
        }

        function setPeriod(p, btn) {
            period = p;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyTimeFilters();
        }

        function applyTimeFilters() {
            const now = new Date();
            const filtered = displayData.filter(r => {
                const d = new Date(r.date);
                if(period === 'daily') return d.toDateString() === now.toDateString();
                if(period === 'weekly') return (now - d) / 86400000 <= 7;
                if(period === 'monthly') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                return d.getFullYear() === now.getFullYear();
            });
            
            const targetData = filtered.length > 0 ? filtered : displayData.slice(0, 10);
            renderTable(targetData);
            updateKPIs(targetData);
            updateCharts(targetData);
        }

        function renderTable(data) {
            const body = document.getElementById('log-body');
            body.innerHTML = data.slice(0, 10).map(r => {
                const eff = r.target > 0 ? ((r.actual/r.target)*100).toFixed(1) : 0;
                return `<tr>
                    <td>${r.date}</td><td>${r.shift}</td><td>${r.line}</td><td>${r.actual}</td>
                    <td style="color:${eff < 60 ? 'var(--danger)' : 'var(--success)'}; font-weight:bold">${eff}%</td>
                    <td class="admin-only" style="display:${isEngineer ? 'table-cell' : 'none'}">
                        <button onclick="deleteRow(${r.id})" style="color:var(--danger); border:none; background:none; cursor:pointer">🗑</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function updateKPIs(data) {
            const t = data.reduce((acc, r) => { acc.a += r.actual; acc.t += r.target; acc.d += r.down; acc.rej += r.rejects; return acc; }, {a:0, t:0, d:0, rej:0});
            document.getElementById('kpi-yield').innerText = t.a.toLocaleString();
            document.getElementById('kpi-eff').innerText = (t.t > 0 ? (t.a/t.t*100) : 0).toFixed(1) + '%';
            document.getElementById('kpi-quality').innerText = (t.a > 0 ? ((t.a - t.rej)/t.a*100) : 100).toFixed(1) + '%';
            document.getElementById('kpi-down').innerText = t.d + 'm';
        }

        function initCharts() {
            const cfg = { responsive: true, maintainAspectRatio: false };
            charts.prod = new Chart(document.getElementById('prodChart'), {
                type: 'line', data: { labels: [], datasets: [{ label: 'Actual', borderColor: '#0ea5e9', data: [] }, { label: 'Target', borderColor: '#8b5cf6', data: [], borderDash: [5,5] }]}, options: cfg
            });
            charts.eff = new Chart(document.getElementById('effChart'), {
                type: 'bar', data: { labels: [], datasets: [{ label: 'Eff %', backgroundColor: '#f59e0b', data: [] }]}, options: { ...cfg, scales: { y: { max: 100 } } }
            });
        }

        function updateCharts(data) {
            if(!charts.prod) return;
            const plotData = [...data].reverse().slice(-10);
            const labels = plotData.map(r => r.date.slice(5) + " " + (r.shift === 'Day Shift' ? 'D' : 'N'));
            
            charts.prod.data.labels = labels;
            charts.prod.data.datasets[0].data = plotData.map(r => r.actual);
            charts.prod.data.datasets[1].data = plotData.map(r => r.target);
            charts.prod.update();

            const lines = [...new Set(data.map(r => r.line))].sort();
            charts.eff.data.labels = lines;
            charts.eff.data.datasets[0].data = lines.map(l => {
                const rows = data.filter(x => x.line === l);
                const a = rows.reduce((s,x) => s + x.actual, 0);
                const t = rows.reduce((s,x) => s + x.target, 0);
                return t > 0 ? (a/t*100) : 0;
            });
            charts.eff.update();
        }

        async function deleteRow(id) { if(confirm("Delete?")) { await sb.from('production_logs').delete().eq('id', id); fetchData(); } }
        setInterval(() => { document.getElementById('live-clock').innerText = new Date().toLocaleString(); }, 1000);
    </script>
</body>
</html>
